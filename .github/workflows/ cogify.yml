name: Pierrevert COG Generator
on:
  push:
    paths: ['data/pv_stack_final.tif'] # Fires only when the raw data changes
jobs:
  build-cog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install GDAL
        run: sudo apt-get install gdal-bin
        
      - name: Transform to True COG
        run: |
          # The -of COG flag is critical for mobile streaming
          gdal_translate data/pv_stack_final.tif data/pierrevert_cog.tif \
          -of COG \
          -co COMPRESS=DEFLATE \
          -co PREDICTOR=YES \
          -co ADD_INTEL=YES
          
      - name: Sync Optimized Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/pierrevert_cog.tif
          git commit -m "Optimize: Flattened stripes to True COG" || exit 0
          git push


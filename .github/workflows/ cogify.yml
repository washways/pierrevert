name: Pierrevert COG Generator
on: [push] # This fires on ANY push to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the 'Sync' step
    steps:
      - uses: actions/checkout@v4
      
      - name: Install GIS Tools
        run: sudo apt-get install gdal-bin
        
      - name: Convert TIF to COG
        run: |
          # Only run if the file exists
          if [ -f "data/pv_stack_final.tif" ]; then
            gdal_translate data/pv_stack_final.tif data/pierrevert_cog.tif \
            -co TILED=YES -co COPY_SRC_OVERVIEWS=YES -co COMPRESS=DEFLATE
          else
            echo "File data/pv_stack_final.tif not found!"
            exit 1
          fi
          
      - name: Sync Back to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/pierrevert_cog.tif
          git commit -m "Auto-generated COG" || exit 0
          git push

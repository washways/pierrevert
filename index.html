<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert Analytics</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { margin: 0; height: 100%; width: 100%; background: #000; }
        .tabs {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; background: rgba(0,0,0,0.85);
            padding: 5px; border-radius: 50px; border: 1px solid #d4af37;
        }
        .tab {
            padding: 10px 20px; color: #fff; cursor: pointer; font-size: 14px;
            border-radius: 40px; transition: 0.2s; white-space: nowrap;
        }
        .tab.active { background: #d4af37; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="tabs">
        <div class="tab active" onclick="setLayer(0, this)">Vigor</div>
        <div class="tab" onclick="setLayer(1, this)">Soil</div>
        <div class="tab" onclick="setLayer(2, this)">Slope</div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
    <script src="https://unpkg.com/chroma-js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([43.811, 5.750], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let geoLayer;
        const cogUrl = "data/pierrevert_cog.tif";

        function setLayer(bandIndex, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (geoLayer) map.removeLayer(geoLayer);
            parseGeoraster(cogUrl).then(georaster => {
                geoLayer = new GeoRasterLayer({
                    georaster: georaster, opacity: 0.7,
                    pixelValuesToColorFn: vals => {
                        const v = vals[bandIndex];
                        if (v === 0 || isNaN(v)) return null;
                        if (bandIndex === 0) return chroma.scale('YlGn')(v / 0.5).hex();
                        if (bandIndex === 1) return chroma.scale(['#fff', '#d4af37', '#5d4037'])(v / 0.3).hex();
                        if (bandIndex === 2) return chroma.scale('Reds')(v / 25).hex();
                    },
                    resolution: 64
                });
                geoLayer.addTo(map);
            });
        }
        setLayer(0, document.querySelector('.tab'));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | Alpha System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { margin: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        #log { position: absolute; top: 10px; left: 10px; right: 10px; height: 80px; background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace; font-size: 10px; padding: 12px; z-index: 9999; border: 1px solid #333; overflow-y: auto; border-radius: 8px; pointer-events: none; }
        .tabs-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; max-width: 500px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: rgba(15,15,15,0.95); padding: 8px; border-radius: 12px; border: 1px solid #444; }
        .tab { text-align: center; color: #555; font-size: 9px; padding: 12px 0; cursor: pointer; text-transform: uppercase; font-weight: 800; }
        .tab.active { color: #d4af37; background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; }
    </style>
</head>
<body>

    <div id="log">PRE-FLIGHT: Checking Engine...</div>
    <div id="map"></div>

    <div class="tabs-container">
        <div id="t0" class="tab active" onclick="render(0, this)">Vigor</div>
        <div id="t3" class="tab" onclick="render(3, this)">Water</div>
        <div id="t7" class="tab" onclick="render(7, this)">Thermal</div>
        <div id="t2" class="tab" onclick="render(2, this)">Slope</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>

    <script>
        const logger = (m) => { 
            const l = document.getElementById('log');
            if (l) l.innerHTML = `> ${m}<br>` + l.innerHTML;
            console.log(m);
        };

        let map, geoLayer, activeGeo = null;
        const cogUrl = "data/pierrevert_final.tif?v=" + Date.now();

        async function init() {
            logger("CHECK 1: Libraries...");
            if (typeof L === 'undefined') return logger("ERR: Leaflet Missing");
            if (typeof chroma === 'undefined') return logger("ERR: Chroma Missing");
            if (typeof parseGeoraster === 'undefined') return logger("ERR: Georaster Missing");

            logger("CHECK 2: Map Setup...");
            try {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.811, 5.750], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                logger("CHECK 3: Fetching TIFF Metadata...");
                // Lazy-load: We pass the URL, not a buffer
                activeGeo = await parseGeoraster(cogUrl);
                
                logger(`SUCCESS: 8 Bands Online (${activeGeo.width}x${activeGeo.height})`);
                render(0, document.getElementById('t0'));
            } catch (e) {
                logger("FATAL ERROR: " + e.message);
                if (e.message.includes("404")) logger("Check if /data/pierrevert_final.tif exists on GitHub.");
            }
        }

        function render(band, el) {
            if (!activeGeo) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (geoLayer) map.removeLayer(geoLayer);

            logger(`STREAMING: Band ${band}...`);
            
            geoLayer = new GeoRasterLayer({
                georaster: activeGeo,
                opacity: 0.8,
                resolution: 128,
                pixelValuesToColorFn: vals => {
                    const v = vals[band];
                    if (!v || v === 0) return null;
                    if (band === 0) return chroma.scale(['#444', '#d4af37', '#27ae60']).domain([0.05, 0.25])(v).hex();
                    if (band === 3) return chroma.scale(['#eee', '#3498db', '#000080']).domain([-0.1, 0.3])(v).hex();
                    if (band === 7) return chroma.scale(['#3498db', '#f39c12', '#e74c3c']).domain([25, 45])(v).hex();
                    if (band === 2) return chroma.scale(['#111', '#ff4444']).domain([0, 25])(v).hex();
                    return null;
                }
            });
            geoLayer.addTo(map);
        }

        // Fire immediately
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | Visual Force</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); overflow: hidden; }
        #log { position: absolute; top: 10px; right: 10px; left: 10px; height: 70px; background: rgba(0,0,0,0.95); color: #0f0; font-family: monospace; font-size: 10px; padding: 8px; z-index: 5000; border: 1px solid #333; pointer-events: none; }
        .tabs { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; background: #111; padding: 5px; width: 90%; max-width: 400px; border: 1px solid #444; }
        .tab { flex: 1; text-align: center; padding: 12px; color: #666; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="log">SYSTEM: Forcing Visual Overlay...</div>
    <div id="map"></div>

    <div class="tabs">
        <div class="tab active" onclick="render(0, this)">Vigor</div>
        <div class="tab" onclick="render(1, this)">Soil</div>
        <div class="tab" onclick="render(2, this)">Terrain</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
    <script src="https://unpkg.com/chroma-js"></script>

    <script>
        function logger(msg) {
            const l = document.getElementById('log');
            l.innerHTML += "<br>> " + msg;
            l.scrollTop = l.scrollHeight;
        }

        const map = L.map('map', { zoomControl: false }).setView([43.811, 5.750], 14);
        
        // Base Map (Dark)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let geoLayer;
        let activeGeoraster = null;
        const cogUrl = "data/pierrevert_cog.tif";

        async function init() {
            try {
                const response = await fetch(cogUrl);
                const buffer = await response.arrayBuffer();
                activeGeoraster = await parseGeoraster(buffer);
                
                logger("DATA BOUNDS: " + activeGeoraster.xmin.toFixed(0));
                
                // DRAW A RED BOX around the data area to prove location
                const southWest = L.Projection.SphericalMercator.unproject({x: activeGeoraster.xmin, y: activeGeoraster.ymin});
                const northEast = L.Projection.SphericalMercator.unproject({x: activeGeoraster.xmax, y: activeGeoraster.ymax});
                L.rectangle([southWest, northEast], {color: "#ff0000", weight: 2, fill: false}).addTo(map);
                
                logger("Red bounding box added to map.");
                render(0, document.querySelector('.tab'));
            } catch (e) {
                logger("ERR: " + e.message);
            }
        }

        function render(band, el) {
            if (!activeGeoraster) return;
            if (geoLayer) map.removeLayer(geoLayer);
            
            logger("Drawing Band " + band + "...");

            geoLayer = new GeoRasterLayer({
                georaster: activeGeoraster,
                opacity: 0.9,
                // CRITICAL: Lower resolution (64) uses much less iPhone memory
                resolution: 64, 
                pixelValuesToColorFn: vals => {
                    const v = vals[band];
                    if (v === null || isNaN(v) || v === 0) return null;
                    
                    // NEON MODE: High contrast to ensure visibility
                    if (band === 0) return chroma.scale(['black', '#00ff00']).domain([0.05, 0.25])(v).hex();
                    if (band === 1) return chroma.scale(['black', '#ffff00']).domain([0, 0.2])(v).hex();
                    if (band === 2) return chroma.scale(['black', '#00ffff']).domain([0, 25])(v).hex();
                }
            });

            geoLayer.addTo(map);
            logger("Layer added to map pane.");
        }

        map.on('click', (e) => {
            if (!activeGeoraster) return;
            const p = L.Projection.SphericalMercator.project(e.latlng);
            const x = Math.floor((p.x - activeGeoraster.xmin) / activeGeoraster.pixelWidth);
            const y = Math.floor((activeGeoraster.ymax - p.y) / activeGeoraster.pixelHeight);
            
            try {
                const val = activeGeoraster.values[0][y][x];
                logger("TAP VALUE: " + val.toFixed(3));
                L.popup().setLatLng(e.latlng).setContent("Value: " + val.toFixed(3)).openOn(map);
            } catch (err) { logger("Tap outside bounds."); }
        });

        init();
    </script>
</body>
</html>

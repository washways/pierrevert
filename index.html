<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert Intelligence</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); font-family: system-ui, sans-serif; overflow: hidden; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 0.5s; }
        .tabs { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; background: rgba(15,15,15,0.9); padding: 5px; border-radius: 4px; border: 1px solid #333; width: 90%; max-width: 400px; }
        .tab { flex: 1; text-align: center; padding: 12px; color: #777; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .tab.active { color: var(--gold); font-weight: bold; }
        #status { position: absolute; top: 10px; right: 10px; color: var(--gold); font-size: 10px; z-index: 2000; background: black; padding: 5px; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="color:var(--gold)">Pierrevert</h1>
        <p style="color:#888">Initialising GIS Stack...</p>
        <button onclick="dismissSplash()" id="start-btn" style="background:var(--gold); border:none; padding:15px 30px; font-weight:bold; display:none;">ENTER DASHBOARD</button>
    </div>

    <div id="status">Status: Initializing...</div>
    <div id="map"></div>

    <div class="tabs">
        <div class="tab active" onclick="setLayer(0, this)">Vigor</div>
        <div class="tab" onclick="setLayer(1, this)">Soil</div>
        <div class="tab" onclick="setLayer(2, this)">Terrain</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
    <script src="https://unpkg.com/chroma-js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([43.811, 5.750], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let geoLayer;
        // ABSOLUTE PATH FIX: Forces browser to look in the correct subdirectory
        const cogUrl = window.location.origin + window.location.pathname.replace('index.html', '') + "data/pierrevert_cog.tif";

        function dismissSplash() { document.getElementById('splash').style.display = 'none'; }

        function setLayer(bandIndex, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (geoLayer) map.removeLayer(geoLayer);

            document.getElementById('status').innerText = "Loading Data...";

            fetch(cogUrl).then(response => {
                if (!response.ok) throw new Error("HTTP error " + response.status);
                return response.arrayBuffer();
            }).then(arrayBuffer => {
                return parseGeoraster(arrayBuffer);
            }).then(georaster => {
                document.getElementById('status').innerText = "Rendering Band " + bandIndex;
                document.getElementById('start-btn').style.display = 'block';

                geoLayer = new GeoRasterLayer({
                    georaster: georaster,
                    opacity: 0.8,
                    pixelValuesToColorFn: vals => {
                        const v = vals[bandIndex];
                        // WIDE NET: If any data exists, color it. 
                        // Helps us see if the values are just super low.
                        if (v === 0 || isNaN(v)) return null;

                        if (bandIndex === 0) { // Vigor
                            const s = (v - 0.01) / 0.3; // Lower floor to 0.01
                            return chroma.scale(['#222', '#d4af37', '#27ae60']).domain([0, 1])(s).hex();
                        }
                        if (bandIndex === 1) { // Soil
                            const s = v / 0.25;
                            return chroma.scale(['#111', '#d4af37', '#ffffff']).domain([0, 1])(s).hex();
                        }
                        if (bandIndex === 2) { // Slope
                            const s = v / 30;
                            return chroma.scale(['#111', '#ff4444']).domain([0, 1])(s).hex();
                        }
                    },
                    resolution: 64
                });
                geoLayer.addTo(map);
            }).catch(err => {
                document.getElementById('status').innerText = "Error: " + err.message;
            });
        }

        setLayer(0, document.querySelector('.tab'));
    </script>
</body>
</html>

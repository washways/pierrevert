<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | System Alpha v3.2</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --gold: #d4af37; --bg: #050505; --ui: rgba(15, 15, 15, 0.98); }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        
        /* Dual-Core Mode Toggle */
        .mode-switch { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; gap: 8px; background: var(--ui); padding: 6px; border-radius: 30px; border: 1px solid #444; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        .m-btn { background: transparent; color: #666; border: none; padding: 10px 22px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .m-btn.active { background: var(--gold); color: #000; }

        /* Hydro-Geological Band Tabs */
        .tabs-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; max-width: 500px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: var(--ui); padding: 10px; border-radius: 18px; border: 1px solid #444; }
        .tab { text-align: center; color: #555; font-size: 9px; padding: 14px 0; cursor: pointer; text-transform: uppercase; font-weight: 800; border-radius: 10px; border: 1px solid transparent; }
        .tab.active { color: var(--gold); background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); }

        /* Status UI (Optional: for monitoring load) */
        #loader { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 1500; color: var(--gold); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; display: none; }
    </style>
</head>
<body>

    <div class="mode-switch">
        <button id="btn-phys" class="m-btn active" onclick="switchCube('physiology')">Physiology</button>
        <button id="btn-terr" class="m-btn" onclick="switchCube('terrain')">Terrain</button>
    </div>
    
    <div id="loader">Processing Terroir...</div>
    <div id="map"></div>
    <div class="tabs-container" id="tabs-ui"></div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        let map, geoLayer, activeGeo = null, currentMode = 'physiology';

        // 1. ABSOLUTE PATH RESOLUTION (Fixes WebWorker 404s)
        const path = window.location.pathname;
        const dir = path.substring(0, path.lastIndexOf('/')) + '/';
        const absoluteBase = window.location.origin + dir;

        // 2. CONFIG: Calibrated for v3 (Int16 / 100)
        const config = {
            physiology: { 
                url: absoluteBase + "data/physiology_v3.tif", 
                bands: ["Vigor", "Water", "Thermal", "Clay"],
                scales: [
                    [0.05, 0.25, ['#333', '#d4af37', '#27ae60']], // Vigor (NDRE)
                    [-0.1, 0.3, ['#eee', '#3498db', '#000080']],  // Water (NDMI)
                    [25, 45, ['#3498db', '#f39c12', '#e74c3c']],   // Temp (C)
                    [1.0, 2.2, ['#fdf5e6', '#8b4513']]             // Clay Index
                ]
            },
            terrain: { 
                url: absoluteBase + "data/terrain_v3.tif", 
                bands: ["Soil", "Slope", "TPI", "Aspect"],
                scales: [
                    [0, 0.2, ['#3d2b1f', '#d4af37', '#fff']],     // BSI
                    [0, 25, ['#111', '#ff4444']],                 // Slope
                    [-5, 5, ['#2e8b57', '#eee', '#8b0000']],      // TPI
                    [-1, 1, ['#2c3e50', '#f1c40f']]               // Northness
                ]
            }
        };

        async function switchCube(type) {
            currentMode = type;
            document.getElementById('loader').style.display = 'block';
            
            // Toggle UI State
            document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(type === 'physiology' ? 'btn-phys' : 'btn-terr').classList.add('active');
            
            if (geoLayer) map.removeLayer(geoLayer);
            
            try {
                // --- VELOCITY ENGINE: LAZY LOAD CONFIG ---
                // load_data: false triggers COG behavior (Streams only visible pixels)
                activeGeo = await parseGeoraster(config[type].url, { 
                    load_data: false, 
                    use_web_worker: true 
                });
                
                // Build Tabs
                const container = document.getElementById('tabs-ui');
                container.innerHTML = config[type].bands.map((name, i) => 
                    `<div class="tab ${i===0?'active':''}" onclick="render(${i}, this)">${name}</div>`
                ).join('');
                
                render(0, container.firstChild);
                document.getElementById('loader').style.display = 'none';
            } catch (e) { 
                console.error("Fetch Error:", e);
                document.getElementById('loader').innerText = "Load Failed";
            }
        }

        function render(band, el) {
            if (!activeGeo || !el) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            if (geoLayer) map.removeLayer(geoLayer);

            const settings = config[currentMode].scales[band];

            geoLayer = new GeoRasterLayer({
                georaster: activeGeo,
                opacity: 0.85,
                resolution: 128, // Increase to 64 for even more speed on older phones
                pixelValuesToColorFn: vals => {
                    // DECODE: Convert Int16 back to original float
                    const v = vals[0] / 100; 
                    if (v === null || isNaN(v) || v === 0) return null;
                    
                    return chroma.scale(settings[2]).domain([settings[0], settings[1]])(v).hex();
                }
            });
            geoLayer.addTo(map);
        }

        // Initialize Map
        map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            preferCanvas: true // Significant mobile performance boost
        }).setView([43.811, 5.750], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // Initial Boot
        switchCube('physiology');
    </script>
</body>
</html>

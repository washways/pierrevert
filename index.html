<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | System Debug</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); overflow: hidden; }
        
        /* THE LOG: This replaces the console for iPhone testing */
        #log { position: absolute; top: 10px; right: 10px; left: 10px; height: 60px; background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace; font-size: 10px; padding: 5px; overflow-y: scroll; z-index: 5000; border: 1px solid #333; pointer-events: none; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 4000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: 0.5s; }
        #start-btn { background: var(--gold); border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; display: none; }
        
        .tabs { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; background: #111; padding: 5px; border-radius: 4px; border: 1px solid #333; width: 90%; }
        .tab { flex: 1; text-align: center; padding: 12px; color: #777; font-size: 11px; text-transform: uppercase; }
        .tab.active { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="log">SYSTEM LOG: Initializing...</div>
    
    <div id="splash">
        <h1 style="color:var(--gold)">PIERREVERT</h1>
        <p id="splash-status">LOADING DATA...</p>
        <button id="start-btn" onclick="dismissSplash()">START</button>
    </div>

    <div id="map"></div>

    <div class="tabs">
        <div class="tab active" onclick="render(0, this)">Vigor</div>
        <div class="tab" onclick="render(1, this)">Soil</div>
        <div class="tab" onclick="render(2, this)">Terrain</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
    <script src="https://unpkg.com/chroma-js"></script>

    <script>
        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += "<br>> " + msg;
            l.scrollTop = l.scrollHeight;
        }

        const map = L.map('map', { zoomControl: false }).setView([43.811, 5.750], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let geoLayer;
        let activeGeoraster = null;
        const cogUrl = "data/pierrevert_cog.tif";

        function dismissSplash() {
            log("Dismissing splash screen...");
            document.getElementById('splash').style.opacity = '0';
            // CRITICAL: We move it out of the way so it doesn't block taps
            setTimeout(() => { 
                document.getElementById('splash').style.display = 'none'; 
                log("Splash removed. Map interaction enabled.");
            }, 500);
        }

        async function init() {
            log("Fetching COG...");
            try {
                const response = await fetch(cogUrl);
                if (!response.ok) throw new Error("File not found on GitHub");
                
                const buffer = await response.arrayBuffer();
                log("Parsing Georaster (" + buffer.byteLength + " bytes)...");
                activeGeoraster = await parseGeoraster(buffer);
                
                log("Georaster Ready. Bounds: " + activeGeoraster.xmin.toFixed(2));
                document.getElementById('splash-status').innerText = "ENGINE READY";
                document.getElementById('start-btn').style.display = 'block';
                render(0, document.querySelector('.tab'));
            } catch (e) {
                log("ERROR: " + e.message);
            }
        }

        function render(band, el) {
            if (!activeGeoraster) return;
            log("Rendering Band " + band);
            
            if (geoLayer) map.removeLayer(geoLayer);
            
            geoLayer = new GeoRasterLayer({
                georaster: activeGeoraster,
                opacity: 0.8,
                pixelValuesToColorFn: vals => {
                    const v = vals[band];
                    if (v === 0 || isNaN(v) || v < -1) return null;
                    if (band === 0) return chroma.scale(['#222', '#d4af37', '#27ae60']).domain([0.05, 0.25])(v).hex();
                    if (band === 1) return chroma.scale(['#111', '#d4af37', '#ffffff']).domain([0, 0.2])(v).hex();
                    if (band === 2) return chroma.scale(['#111', '#ff4444']).domain([0, 25])(v).hex();
                },
                resolution: 128
            });
            geoLayer.addTo(map);
        }

        // IMPROVED TAP HANDLER
        map.on('mousedown click', (e) => {
            log("Tap detected at: " + e.latlng.lat.toFixed(4));
            
            if (!activeGeoraster) {
                log("Tap ignored: Data not ready.");
                return;
            }

            try {
                const x = Math.floor((e.latlng.lng - activeGeoraster.xmin) / activeGeoraster.pixelWidth);
                const y = Math.floor((activeGeoraster.ymax - e.latlng.lat) / activeGeoraster.pixelHeight);
                
                log("Pixel Coords: X=" + x + " Y=" + y);
                
                const v = activeGeoraster.values.map(b => b[y] ? b[y][x] : null);
                
                if (v[0] !== null) {
                    log("VALUE FOUND: " + v[0].toFixed(3));
                    L.popup()
                        .setLatLng(e.latlng)
                        .setContent(`V: ${v[0].toFixed(3)}<br>S: ${v[1].toFixed(3)}<br>T: ${v[2].toFixed(1)}°`)
                        .openOn(map);
                } else {
                    log("Pixel is Empty (NoData)");
                }
            } catch (err) {
                log("Logic Error: " + err.message);
            }
        });

        init();
    </script>
</body>
</html>

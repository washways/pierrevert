<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | Emergency Debug</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #map { margin: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        #log { position: absolute; top: 10px; left: 10px; right: 10px; height: 100px; background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace; font-size: 11px; padding: 15px; z-index: 9999; border: 2px solid #333; overflow-y: auto; border-radius: 8px; }
        .tabs-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #111; padding: 10px; border-radius: 12px; border: 1px solid #444; }
        .tab { text-align: center; color: #444; font-size: 10px; padding: 12px 0; cursor: pointer; text-transform: uppercase; font-weight: 800; border: 1px solid transparent; }
        .tab.active { color: #d4af37; border-bottom: 2px solid #d4af37; }
    </style>
</head>
<body>

    <div id="log">1. HTML LOADED. Awaiting Script...</div>
    <div id="map"></div>

    <div class="tabs-container">
        <div id="t0" class="tab active" onclick="render(0, this)">Vigor</div>
        <div id="t3" class="tab" onclick="render(3, this)">Water</div>
        <div id="t7" class="tab" onclick="render(7, this)">Thermal</div>
        <div id="t2" class="tab" onclick="render(2, this)">Slope</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        const logger = (m) => { 
            const l = document.getElementById('log');
            if (l) l.innerHTML = `> ${m}<br>` + l.innerHTML;
            console.log(m);
        };

        // 2. IMMEDIATE SCRIPT START
        logger("2. SCRIPT STARTED. Checking Libraries...");

        let map, geoLayer, activeGeo = null;
        
        // POINT THIS TO YOUR LARGEST FILENAME IF 'pierrevert_final.tif' IS MISSING
        const cogUrl = "data/pierrevert_final.tif"; 

        async function init() {
            try {
                // Check if Libraries are present
                if (typeof L === 'undefined') throw new Error("Leaflet Library Missing");
                if (typeof chroma === 'undefined') throw new Error("Chroma Library Missing");
                if (typeof parseGeoraster === 'undefined') throw new Error("Georaster Library Missing");
                
                logger("3. LIBRARIES OK. Building Map...");
                map = L.map('map', { zoomControl: false }).setView([43.811, 5.750], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

                logger(`4. FETCHING: ${cogUrl}`);
                const response = await fetch(cogUrl, { method: 'HEAD' });
                
                if (!response.ok) {
                    throw new Error(`File not found at ${cogUrl}. Check your GitHub folder!`);
                }

                logger("5. FILE FOUND. Unpacking COG...");
                activeGeo = await parseGeoraster(cogUrl);
                
                logger("6. SUCCESS! 8-Band Stack Online.");
                render(0, document.getElementById('t0'));

            } catch (err) {
                logger("❌ FATAL: " + err.message);
                // This alert will pop up on your phone so you can't miss it
                alert("System Error: " + err.message);
            }
        }

        function render(band, el) {
            if (!activeGeo) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (geoLayer) map.removeLayer(geoLayer);

            logger(`Rendering Band ${band}...`);
            geoLayer = new GeoRasterLayer({
                georaster: activeGeo,
                opacity: 0.8,
                resolution: 64,
                pixelValuesToColorFn: vals => {
                    const v = vals[band];
                    if (!v || v === 0) return null;
                    if (band === 0) return chroma.scale(['#333', '#d4af37', '#27ae60']).domain([0.05, 0.25])(v).hex();
                    if (band === 3) return chroma.scale(['#eee', '#3498db', '#000080']).domain([-0.1, 0.3])(v).hex();
                    if (band === 7) return chroma.scale(['#3498db', '#f39c12', '#e74c3c']).domain([25, 45])(v).hex();
                    if (band === 2) return chroma.scale(['#111', '#ff4444']).domain([0, 25])(v).hex();
                }
            });
            geoLayer.addTo(map);
        }

        // FIRE IMMEDIATELY
        init();
    </script>
</body>
</html>

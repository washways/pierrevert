<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | System Alpha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #d4af37; --bg: #050505; --ui: rgba(15, 15, 15, 0.98); }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); font-family: system-ui, sans-serif; overflow: hidden; }
        #log { position: absolute; top: 10px; left: 10px; right: 10px; height: 60px; background: var(--ui); color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; z-index: 9999; border: 1px solid #333; border-radius: 8px; pointer-events: none; }
        .tabs-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; max-width: 500px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: var(--ui); padding: 8px; border-radius: 12px; border: 1px solid #444; }
        .tab { text-align: center; color: #555; font-size: 9px; padding: 12px 0; cursor: pointer; text-transform: uppercase; font-weight: 800; border-radius: 6px; }
        .tab.active { color: var(--gold); background: rgba(212,175,55,0.1); border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="log">SYSTEM: Optimizing 8-Band Stream...</div>
    <div id="map"></div>

    <div class="tabs-container">
        <div id="t0" class="tab active" onclick="render(0, this)">Vigor</div>
        <div id="t3" class="tab" onclick="render(3, this)">Water</div>
        <div id="t7" class="tab" onclick="render(7, this)">Thermal</div>
        <div id="t2" class="tab" onclick="render(2, this)">Slope</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        const logger = (m) => { document.getElementById('log').innerHTML = `> ${m}<br>` + document.getElementById('log').innerHTML; };
        let map, geoLayer, activeGeo = null;
        const cogUrl = "data/pierrevert_final.tif"; 

        async function init() {
            logger("1. ENGINE: Booting...");
            map = L.map('map', { zoomControl: false }).setView([43.811, 5.750], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

            try {
                // IMPORTANT: We load metadata ONLY. 
                // We do NOT download the pixel arrays yet.
                activeGeo = await parseGeoraster(cogUrl, { load_data: false });
                
                logger(`2. SUCCESS: 8-Band Meta Loaded.`);
                render(0, document.getElementById('t0'));

                // Interaction Probe (remains the same)
                map.on('click', async (ev) => {
                    const pt = L.Projection.SphericalMercator.project(ev.latlng);
                    const x = Math.floor((pt.x - activeGeo.xmin) / activeGeo.pixelWidth);
                    const y = Math.floor((activeGeo.ymax - pt.y) / activeGeo.pixelHeight);
                    try {
                        // We query the file directly for just 1 pixel
                        const vals = await activeGeo.getValues({left: x, top: y, width: 1, height: 1});
                        L.popup().setLatLng(ev.latlng).setContent(`
                            <b>Vigor:</b> ${vals[0][0][0].toFixed(3)}<br>
                            <b>Water:</b> ${vals[3][0][0].toFixed(2)}<br>
                            <b>Temp:</b> ${vals[7][0][0].toFixed(1)}°C
                        `).openOn(map);
                    } catch(e) {}
                });
            } catch (e) { logger("❌ ERROR: " + e.message); }
        }

        function render(band, el) {
            if (!activeGeo) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            // CLEANUP: Force the browser to forget the previous layer entirely
            if (geoLayer) {
                map.removeLayer(geoLayer);
                geoLayer = null; 
            }

            logger(`STREAMING: Band ${band} only...`);

            geoLayer = new GeoRasterLayer({
                georaster: activeGeo,
                opacity: 0.8,
                resolution: 64, // Lower resolution makes the "render" much safer
                
                /* THE CRITICAL MEMORY FIX */
                // This tells the library to ONLY fetch the active band from the TIFF
                // instead of trying to process all 8.
                bands: [band], 

                pixelValuesToColorFn: vals => {
                    // Because we specified 'bands: [band]', 'vals' only contains 1 value
                    const v = vals[0]; 
                    if (!v || v === 0) return null;

                    // Apply your hydrogeology color scales
                    if (band === 0) return chroma.scale(['#333', '#d4af37', '#27ae60']).domain([0.05, 0.25])(v).hex();
                    if (band === 3) return chroma.scale(['#eee', '#3498db', '#000080']).domain([-0.1, 0.3])(v).hex();
                    if (band === 7) return chroma.scale(['#3498db', '#f39c12', '#e74c3c']).domain([25, 45])(v).hex();
                    if (band === 2) return chroma.scale(['#111', '#ff4444']).domain([0, 25])(v).hex();
                }
            });
            geoLayer.addTo(map);
        }
        init();
    </script>
</body>
</html>

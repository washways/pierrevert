<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | System Alpha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #d4af37; --bg: #050505; --ui: rgba(15, 15, 15, 0.98); }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); font-family: system-ui, sans-serif; overflow: hidden; }
        #log { position: absolute; top: 10px; left: 10px; right: 10px; height: 85px; background: var(--ui); color: #0f0; font-family: monospace; font-size: 10px; padding: 12px; z-index: 9999; border: 1px solid #333; border-radius: 8px; overflow-y: auto; pointer-events: none; }
        .tabs-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 94%; max-width: 500px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: var(--ui); padding: 10px; border: 1px solid #444; border-radius: 14px; }
        .tab { text-align: center; padding: 14px 2px; color: #555; cursor: pointer; font-size: 9px; text-transform: uppercase; font-weight: 800; border-radius: 6px; border: 1px solid transparent; }
        .tab.active { color: var(--gold); background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); }
        .leaflet-popup-content-wrapper { background: var(--ui); color: white; border: 1px solid var(--gold); border-radius: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; border-bottom: 1px solid #222; font-family: monospace; font-size: 11px; }
        .stat-label { color: #888; text-transform: uppercase; }
        .stat-val { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="log">SYSTEM: Awaiting Connection...</div>
    <div id="map"></div>

    <div class="tabs-container">
        <div id="t0" class="tab active" onclick="render(0, this)">Vigor</div>
        <div id="t3" class="tab" onclick="render(3, this)">Water</div>
        <div id="t7" class="tab" onclick="render(7, this)">Thermal</div>
        <div id="t2" class="tab" onclick="render(2, this)">Slope</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        const logger = (m, color = "#0f0") => { 
            const l = document.getElementById('log');
            if (l) l.innerHTML = `<span style="color:${color}">> ${m}</span><br>` + l.innerHTML;
        };

        let map, geoLayer, activeGeo = null;
        // Cache-buster added to force GitHub to serve the latest 20.8MB file
        const cogUrl = "data/pierrevert_final.tif?v=" + Date.now(); 

        async function init() {
            logger("1. ENGINE: Map Ready.");
            try {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.811, 5.750], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                logger("2. NETWORK: Starting Stream...");
                
                const response = await fetch(cogUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}: File not found.`);

                // --- PROGRESS TRACKER ---
                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    if (contentLength) {
                        const pct = (receivedLength / contentLength * 100).toFixed(0);
                        const mb = (receivedLength / 1048576).toFixed(1);
                        // Only log every 25% to avoid cluttering the screen
                        if (pct % 25 === 0) logger(`DOWNLOADING: ${mb}MB (${pct}%)`);
                    }
                }

                logger("3. UNPACKING: Parsing 8-Band Structure...");
                const blob = new Blob(chunks);
                const buffer = await blob.arrayBuffer();
                activeGeo = await parseGeoraster(buffer);
                
                logger(`4. SUCCESS: ${activeGeo.numberOfBands} Bands Online.`);
                
                // Set up Map Click
                map.on('click', (ev) => {
                    const pt = L.Projection.SphericalMercator.project(ev.latlng);
                    const x = Math.floor((pt.x - activeGeo.xmin) / activeGeo.pixelWidth);
                    const y = Math.floor((activeGeo.ymax - pt.y) / activeGeo.pixelHeight);
                    try {
                        const vigor = activeGeo.values[0][y][x];
                        const water = activeGeo.values[3][y][x];
                        const temp  = activeGeo.values[7][y][x];
                        L.popup().setLatLng(ev.latlng).setContent(`
                            <div style="min-width:140px">
                                <div class="stat-row"><span class="stat-label">Vigor</span><span class="stat-val">${vigor.toFixed(3)}</span></div>
                                <div class="stat-row"><span class="stat-label">Water</span><span class="stat-val">${water.toFixed(2)}</span></div>
                                <div class="stat-row"><span class="stat-label">Thermal</span><span class="stat-val">${temp.toFixed(1)}°C</span></div>
                            </div>
                        `).openOn(map);
                    } catch(e) {}
                });

                render(0, document.getElementById('t0'));

            } catch (e) {
                logger(`CRITICAL: ${e.message}`, "red");
            }
        }

        function render(band, el) {
            if (!activeGeo) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (geoLayer) map.removeLayer(geoLayer);
            logger(`RENDERING: Band ${band}...`);
            geoLayer = new GeoRasterLayer({
                georaster: activeGeo,
                opacity: 0.85,
                resolution: 128,
                pixelValuesToColorFn: vals => {
                    const v = vals[band];
                    if (!v || v === 0) return null;
                    if (band === 0) return chroma.scale(['#333', '#d4af37', '#27ae60']).domain([0.05, 0.25])(v).hex();
                    if (band === 3) return chroma.scale(['#eee', '#3498db', '#000080']).domain([-0.1, 0.3])(v).hex();
                    if (band === 7) return chroma.scale(['#3498db', '#f39c12', '#e74c3c']).domain([25, 45])(v).hex();
                    if (band === 2) return chroma.scale(['#111', '#ff4444']).domain([0, 25])(v).hex();
                }
            });
            geoLayer.addTo(map);
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | System Alpha v3.3</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --gold: #b8860b; --bg: #fdfdfd; --ui: rgba(255, 255, 255, 0.95); --text: #333; }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); font-family: system-ui, sans-serif; overflow: hidden; }
        
        /* SPLASH SCREEN */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; transition: 0.5s; }
        #splash h1 { color: var(--gold); font-size: 24px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        #splash p { color: #666; font-size: 14px; max-width: 300px; line-height: 1.6; margin-bottom: 30px; }
        #start-btn { background: var(--gold); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 15px rgba(184, 134, 11, 0.3); }

        /* UNIFIED LAYER SELECTOR */
        .layer-menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 94%; max-width: 600px; background: var(--ui); padding: 10px; border-radius: 20px; border: 1px solid #ddd; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow-x: auto; display: flex; gap: 8px; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .layer-btn { display: inline-block; padding: 10px 18px; border-radius: 15px; border: 1px solid #eee; background: #f8f8f8; color: #777; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .layer-btn.active { background: var(--gold); color: white; border-color: var(--gold); }

        /* LEGEND / POPUP */
        .leaflet-popup-content-wrapper { background: var(--ui); color: var(--text); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="splash">
        <h1>AOC Pierrevert</h1>
        <p><strong>System Alpha v3.3</strong><br>High-resolution terroir analysis (10m). Optimized for mobile hydro-geological monitoring.</p>
        <button id="start-btn" onclick="dismissSplash()">Explore Terroir</button>
    </div>

    <div id="map"></div>

    <div class="layer-menu">
        <button class="layer-btn active" onclick="setLayer('physiology', 0, this)">Vigor</button>
        <button class="layer-btn" onclick="setLayer('physiology', 1, this)">Moisture</button>
        <button class="layer-btn" onclick="setLayer('physiology', 2, this)">Thermal</button>
        <button class="layer-btn" onclick="setLayer('physiology', 3, this)">Clay</button>
        <button class="layer-btn" onclick="setLayer('terrain', 0, this)">Soil (BSI)</button>
        <button class="layer-btn" onclick="setLayer('terrain', 1, this)">Slope</button>
        <button class="layer-btn" onclick="setLayer('terrain', 2, this)">TPI</button>
        <button class="layer-btn" onclick="setLayer('terrain', 3, this)">Aspect</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        let map, geoLayer, activeGeos = { physiology: null, terrain: null };

        const path = window.location.pathname;
        const dir = path.substring(0, path.lastIndexOf('/')) + '/';
        const absoluteBase = window.location.origin + dir;

        const config = {
            physiology: { 
                url: absoluteBase + "data/physiology_v3.tif", 
                scales: [
                    [0.05, 0.25, ['#333', '#d4af37', '#27ae60']], // Vigor
                    [-0.1, 0.3, ['#eee', '#3498db', '#000080']],  // Moisture
                    [25, 45, ['#3498db', '#f39c12', '#e74c3c']],   // Thermal
                    [1.0, 2.2, ['#fdf5e6', '#8b4513']]             // Clay
                ]
            },
            terrain: { 
                url: absoluteBase + "data/terrain_v3.tif", 
                scales: [
                    [0, 0.2, ['#3d2b1f', '#d4af37', '#fff']],     // Soil
                    [0, 25, ['#eee', '#ff4444']],                 // Slope
                    [-5, 5, ['#2e8b57', '#eee', '#8b0000']],      // TPI
                    [-1, 1, ['#2c3e50', '#f1c40f']]               // Aspect
                ]
            }
        };

        function dismissSplash() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 500);
        }

        async function setLayer(fileKey, bandIdx, btn) {
            document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (geoLayer) map.removeLayer(geoLayer);

            // Lazy Load the file if not already in memory
            if (!activeGeos[fileKey]) {
                activeGeos[fileKey] = await parseGeoraster(config[fileKey].url, { 
                    load_data: false, use_web_worker: true 
                });
            }

            const settings = config[fileKey].scales[bandIdx];
            
            geoLayer = new GeoRasterLayer({
                georaster: activeGeos[fileKey],
                opacity: 0.8,
                resolution: 64, // SPEED FIX: Lower res for smooth mobile panning
                pixelValuesToColorFn: vals => {
                    const v = vals[0] / 100; // 100x Decoder
                    if (!v || isNaN(v) || v === 0) return null;
                    return chroma.scale(settings[2]).domain([settings[0], settings[1]])(v).hex();
                }
            });
            geoLayer.addTo(map);
        }

        // Initialize with Satellite Base
        map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            preferCanvas: true // PERFORMANCE FIX: GPU Rendering
        }).setView([43.811, 5.750], 13);

        // LIGHT THEME / SATELLITE
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        const labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png').addTo(map);

        // Initial Load
        // Wait for user to click "Explore" to prevent background lag
    </script>
</body>
</html>

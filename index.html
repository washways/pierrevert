<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | System Alpha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #d4af37; --bg: #050505; --ui: rgba(15, 15, 15, 0.98); }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        
        #log { position: absolute; top: 10px; left: 10px; right: 10px; height: 60px; background: var(--ui); color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; z-index: 9999; border: 1px solid #333; border-radius: 8px; pointer-events: none; overflow-y: auto; }
        
        .tabs-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; max-width: 500px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: var(--ui); padding: 8px; border: 1px solid #444; border-radius: 12px; }
        .tab { text-align: center; padding: 12px 2px; color: #555; cursor: pointer; font-size: 9px; text-transform: uppercase; font-weight: 800; border-radius: 4px; }
        .tab.active { color: var(--gold); background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); }

        .leaflet-popup-content-wrapper { background: var(--ui); color: white; border: 1px solid var(--gold); border-radius: 8px; }
        .stat-row { display: flex; justify-content: space-between; margin: 4px 0; border-bottom: 1px solid #222; font-family: monospace; font-size: 11px; }
        .stat-label { color: #888; }
        .stat-val { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="log">SYSTEM: Loading Pierrevert Core...</div>
    <div id="map"></div>

    <div class="tabs-container">
        <div id="t0" class="tab active" onclick="render(0, this)">Vigor</div>
        <div id="t3" class="tab" onclick="render(3, this)">Water</div>
        <div id="t7" class="tab" onclick="render(7, this)">Thermal</div>
        <div id="t2" class="tab" onclick="render(2, this)">Slope</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>

    <script>
        const logger = (m) => { 
            const l = document.getElementById('log');
            if (l) l.innerHTML = `> ${m}<br>` + l.innerHTML;
        };

        let map, geoLayer, activeGeo = null;
        // This MUST match the file you downloaded from Colab
        const cogUrl = "data/pierrevert_final.tif"; 

        async function init() {
            logger("INITIALIZING: Map Base...");
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.811, 5.750], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            logger("FETCHING: 8-Band COG Stack...");
            try {
                // Pointing parseGeoraster directly to the URL triggers Lazy Loading (COG mode)
                activeGeo = await parseGeoraster(cogUrl);
                
                logger(`SUCCESS: ${activeGeo.numberOfBands} Bands Online.`);
                render(0, document.getElementById('t0'));
            } catch (e) {
                logger("FATAL ERROR: " + e.message);
                logger("Ensure 'pierrevert_final.tif' is in your /data/ folder.");
            }
        }

        function render(band, el) {
            if (!activeGeo) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (geoLayer) map.removeLayer(geoLayer);

            logger(`STREAMING: Band ${band}...`);
            
            geoLayer = new GeoRasterLayer({
                georaster: activeGeo,
                opacity: 0.8,
                resolution: 128,
                pixelValuesToColorFn: vals => {
                    const v = vals[band];
                    if (!v || v === 0) return null;
                    
                    // Scientific Scales
                    if (band === 0) return chroma.scale(['#444', '#d4af37', '#27ae60']).domain([0.05, 0.25])(v).hex();
                    if (band === 3) return chroma.scale(['#eee', '#3498db', '#000080']).domain([-0.1, 0.3])(v).hex();
                    if (band === 7) return chroma.scale(['#3498db', '#f39c12', '#e74c3c']).domain([25, 45])(v).hex();
                    if (band === 2) return chroma.scale(['#111', '#ff4444']).domain([0, 25])(v).hex();
                    return null;
                }
            });
            geoLayer.addTo(map);
        }

        // Tap Probe Logic
        map.on('click', (ev) => {
            if (!activeGeo) return;
            const pt = L.Projection.SphericalMercator.project(ev.latlng);
            const x = Math.floor((pt.x - activeGeo.xmin) / activeGeo.pixelWidth);
            const y = Math.floor((activeGeo.ymax - pt.y) / activeGeo.pixelHeight);

            try {
                const v = activeGeo.values[0][y][x]; // Vigor
                const w = activeGeo.values[3][y][x]; // Water
                const t = activeGeo.values[7][y][x]; // Temp
                
                L.popup().setLatLng(ev.latlng).setContent(`
                    <div style="min-width:140px">
                        <div class="stat-row"><span class="stat-label">Vigor</span><span class="stat-val">${v.toFixed(3)}</span></div>
                        <div class="stat-row"><span class="stat-label">Water</span><span class="stat-val">${w.toFixed(2)}</span></div>
                        <div class="stat-row"><span class="stat-label">Thermal</span><span class="stat-val">${t.toFixed(1)}°C</span></div>
                    </div>
                `).openOn(map);
            } catch(err) { /* Silent fail for taps outside data */ }
        });

        init();
    </script>
</body>
</html>

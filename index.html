<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pierrevert | System Alpha</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body, html, #map { margin: 0; height: 100%; width: 100%; background: var(--bg); font-family: sans-serif; overflow: hidden; }
        #log { position: absolute; top: 10px; left: 10px; right: 10px; height: 80px; background: rgba(10,10,10,0.95); color: #0f0; font-family: monospace; font-size: 10px; padding: 12px; z-index: 9999; border: 1px solid #333; border-radius: 8px; overflow-y: auto; pointer-events: none; }
        .tabs-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; max-width: 500px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: rgba(15,15,15,0.95); padding: 8px; border-radius: 12px; border: 1px solid #444; }
        .tab { text-align: center; color: #555; font-size: 9px; padding: 12px 0; cursor: pointer; text-transform: uppercase; font-weight: 800; border-radius: 6px; }
        .tab.active { color: var(--gold); background: rgba(212,175,55,0.1); border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="log">BOOT: Engine Igniting...</div>
    <div id="map"></div>

    <div class="tabs-container">
        <div id="t0" class="tab active" onclick="render(0, this)">Vigor</div>
        <div id="t3" class="tab" onclick="render(3, this)">Water</div>
        <div id="t7" class="tab" onclick="render(7, this)">Thermal</div>
        <div id="t2" class="tab" onclick="render(2, this)">Slope</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chroma-js@2.4.2/chroma.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/georaster@1.6.0/dist/georaster.browser.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/georaster-layer-for-leaflet@3.10.0/dist/georaster-layer-for-leaflet.min.js"></script>

    <script>
        const logger = (m) => { 
            const l = document.getElementById('log');
            if (l) l.innerHTML = `> ${m}<br>` + l.innerHTML;
        };

        let map, geoLayer, activeGeo = null;
        const cogUrl = "data/pierrevert_final.tif"; 

        async function init() {
            logger("1. ENGINE: Online.");
            
            try {
                // Set up Map Canvas
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([43.811, 5.750], 14);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                logger("2. FETCH: Requesting TIFF...");
                const response = await fetch(cogUrl);
                if (!response.ok) throw new Error("File Missing at " + cogUrl);
                
                const buffer = await response.arrayBuffer();
                logger(`3. PARSE: Unpacking ${ (buffer.byteLength / 1048576).toFixed(1) }MB...`);

                // We use the most basic parse method. 
                // No workers, no lazy-loading. Just direct binary unpacking.
                activeGeo = await parseGeoraster(buffer);
                
                logger(`4. SUCCESS: ${activeGeo.numberOfBands} Bands Ready.`);
                render(0, document.getElementById('t0'));

                // Probe Logic
                map.on('click', (ev) => {
                    if (!activeGeo) return;
                    const pt = L.Projection.SphericalMercator.project(ev.latlng);
                    const x = Math.floor((pt.x - activeGeo.xmin) / activeGeo.pixelWidth);
                    const y = Math.floor((activeGeo.ymax - pt.y) / activeGeo.pixelHeight);
                    try {
                        const v = activeGeo.values[0][y][x];
                        const w = activeGeo.values[3][y][x];
                        const t = activeGeo.values[7][y][x];
                        L.popup().setLatLng(ev.latlng).setContent(`
                            <b>Vigor:</b> ${v.toFixed(3)}<br>
                            <b>Water:</b> ${w.toFixed(2)}<br>
                            <b>Temp:</b> ${t.toFixed(1)}°C
                        `).openOn(map);
                    } catch(e) {}
                });

            } catch (e) {
                logger("❌ ERROR: " + e.message);
                console.error(e);
            }
        }

        function render(band, el) {
            if (!activeGeo) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            if (geoLayer) map.removeLayer(geoLayer);

            logger(`RENDER: Band ${band}...`);
            
            geoLayer = new GeoRasterLayer({
                georaster: activeGeo,
                opacity: 0.8,
                resolution: 128,
                pixelValuesToColorFn: vals => {
                    const v = vals[band];
                    if (v === null || isNaN(v) || v === 0) return null;
                    
                    if (band === 0) return chroma.scale(['#333', '#d4af37', '#27ae60']).domain([0.05, 0.25])(v).hex();
                    if (band === 3) return chroma.scale(['#eee', '#3498db', '#000080']).domain([-0.1, 0.3])(v).hex();
                    if (band === 7) return chroma.scale(['#3498db', '#f39c12', '#e74c3c']).domain([25, 45])(v).hex();
                    if (band === 2) return chroma.scale(['#111', '#ff4444']).domain([0, 25])(v).hex();
                }
            });
            geoLayer.addTo(map);
        }

        // Fire the engine immediately
        init();
    </script>
</body>
</html>
